name: digest

# Twice-daily summary of the current top matches (08:00 and 18:00 Prague = 06:00 / 16:00
# UTC). Reads the state the pipeline committed; sends one Telegram message, no commit.
on:
  schedule:
    - cron: "0 6,16 * * *"
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: send digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run.py digest
